<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My News Feed</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>My News Feed</h1>
      <div class="header-right">
        <span id="lastUpdated" class="muted">Loading...</span>
        <div id="authBar" class="auth-bar">
          <button id="signInBtn" class="btn-ghost">Sign in</button>
          <span id="userEmail" class="muted" hidden></span>
          <button id="signOutBtn" class="btn-ghost" hidden>Sign out</button>
        </div>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">☀</button>
      </div>
    </div>
  </header>

  <main>
    <!-- Topic picker (visible only when signed in) -->
    <section id="topicPicker" class="topic-picker" hidden>
      <div class="topic-picker-head">
        <h2>My topics</h2>
        <button id="topicPickerToggle" class="btn-ghost" aria-expanded="false">Edit</button>
      </div>
      <div id="topicPickerBody" class="topic-picker-body" hidden>
        <p class="muted">Pick the topics you care about. Filter with the toggle below.</p>
        <div id="presetChips" class="chip-row"></div>
        <div class="custom-topic-row">
          <input
            type="text"
            id="customTopicInput"
            placeholder="Add a custom topic (e.g. drones)"
            autocomplete="off"
          />
          <button id="addCustomTopicBtn" class="btn-primary">Add</button>
        </div>
        <div id="selectedTopics" class="chip-row selected-topics"></div>
        <div class="topic-picker-actions">
          <button id="savePrefsBtn" class="btn-primary">Save preferences</button>
          <span id="prefsStatus" class="muted"></span>
        </div>
      </div>
    </section>

    <!-- Search + Sort + "my topics only" toggle -->
    <div class="toolbar">
      <input
        type="search"
        id="searchInput"
        placeholder="Search articles..."
        autocomplete="off"
      />
      <select id="sortSelect">
        <option value="date">Newest first</option>
        <option value="score">Top rated</option>
      </select>
      <label id="myTopicsOnlyWrap" class="toggle-label" hidden>
        <input type="checkbox" id="myTopicsOnly" />
        <span>My topics only</span>
      </label>
    </div>

    <!-- Topic filter chips (from article data) -->
    <div id="topicFilters" class="chip-row">
      <button class="chip active" data-topic="all">All</button>
    </div>

    <!-- Stats line -->
    <p id="statusBar" class="muted status-bar">Loading articles…</p>

    <!-- Cards -->
    <div id="articlesGrid" class="grid">
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
    </div>

    <div id="loadMoreWrapper" style="display:none; text-align:center; margin-top:32px;">
      <button id="loadMoreBtn" class="btn-primary">Load more</button>
    </div>
  </main>

  <!-- Sign-in modal -->
  <div id="signInModal" class="modal" hidden>
    <div class="modal-card">
      <h2>Sign in with email</h2>
      <p class="muted">Enter your email and we'll send a one-time magic link. No password needed.</p>
      <input type="email" id="signInEmail" placeholder="you@example.com" autocomplete="email" />
      <div class="modal-actions">
        <button id="signInCancelBtn" class="btn-ghost">Cancel</button>
        <button id="signInSubmitBtn" class="btn-primary">Send link</button>
      </div>
      <p id="signInStatus" class="muted"></p>
    </div>
  </div>

</body>
